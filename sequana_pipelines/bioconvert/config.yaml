# ============================================================================
# Config file for Sequana bioconvert
# ==========================================[ Sections for the users ]========
#
# One of input_directory, input_pattern and input_samples must be provided
# If input_directory provided, use it otherwise if input_pattern provided,
# use it, otherwise use input_samples.
# ============================================================================

input_directory: ''
input_pattern: '*.fastq.gz'

# ======================================= [apptainers] ======================
#
apptainers:
  #bioconvert: "https://zenodo.org/record/8078007/files/bioconvert_1.1.0.img"
  bioconvert: "https://zenodo.org/record/19359689/files/bioconvert_1.2.0.img" 
  graphviz: "https://zenodo.org/record/7928262/files/graphviz_7.0.5.img"

##############################################################################
# bioconvert section
#
# :Parameters:
#
# - command: one of the conversion commands (e.g. fastq2fasta, bam2sam, ...)
# - input_extension: extension of input files (e.g. fastq.gz)
# - output_extension: extension of output files (e.g. fasta.gz)
# - method: optional method override (leave empty for default)
bioconvert:
    command: fastq2fasta
    input_extension: fastq.gz
    output_extension: fasta.gz
    method: ''
    resources:
        mem: 4G
